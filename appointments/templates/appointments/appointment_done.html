{% extends 'base.html' %}

{% block title %}예약 완료{% endblock %}

{% block page_title %}<h1 class="page-title">예약 완료</h1>{% endblock %}

{% block content %}
<div style="max-width: 520px;">
  <div class="card" style="text-align:center; padding:36px 32px;">

    <div style="width:72px; height:72px; border-radius:50%; background:#f0f7f5; border:3px solid #4a7c72; color:#4a7c72; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 20px;">
      <i class="ti ti-check"></i>
    </div>

    <p style="font-size:22px; font-weight:700; margin-bottom:8px;">예약이 완료되었습니다</p>
    <p style="font-size:14px; color:#62756f; margin-bottom:28px; line-height:1.6;">예약 내용을 확인해 주세요.<br>검사 당일 10분 전까지 내원해 주시기 바랍니다.</p>

    <div style="background:#f0f7f5; border:1.5px solid #a8cdc3; border-radius:12px; padding:18px 20px; text-align:left; margin-bottom:24px;">
      <div style="display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #d7e6e2; font-size:14px;">
        <span style="color:#62756f;">예약 상태</span>
        <span style="background:#e8f5f1; color:#4a7c72; font-size:12px; font-weight:600; padding:4px 10px; border-radius:20px;">확정</span>
      </div>
      <div style="display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #d7e6e2; font-size:14px;">
        <span style="color:#62756f;">예약 날짜</span>
        <span style="font-weight:600;">{{ date }}</span>
      </div>
      <div style="display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #d7e6e2; font-size:14px;">
        <span style="color:#62756f;">예약 시간</span>
        <span style="font-weight:600;">{{ time }}</span>
      </div>
      <div style="display:flex; justify-content:space-between; padding:7px 0; font-size:14px;">
        <span style="color:#62756f;">검사 종류</span>
        <span style="font-weight:600;">COPD 폐기능검사</span>
      </div>
    </div>

    <a href="/" style="display:block; width:100%; padding:13px; background:#4a7c72; color:#fff; border-radius:12px; font-size:15px; font-weight:600; text-decoration:none; margin-bottom:10px;">홈으로 돌아가기</a>

  </div>
</div>
{% endblock %}
