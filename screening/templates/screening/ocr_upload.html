{% extends "base.html" %}

{% block title %}검진결과지 OCR 업로드 | 미래의료병원{% endblock %}
{% block page_title %}검진결과지 OCR 업로드{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h5 class="mb-0">검진결과지 이미지 업로드</h5>
  </div>

  <div class="card-body">
    <p class="text-muted">
      검진결과지 이미지를 업로드하면 OCR로 텍스트를 추출합니다.
    </p>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      {{ form.as_p }}

      <button type="submit" class="btn btn-primary">
        OCR 실행
      </button>
    </form>
  </div>
</div>
{% endblock %}
