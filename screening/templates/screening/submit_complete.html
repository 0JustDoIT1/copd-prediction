{% extends "base.html" %}

{% block content %}

<style>
  .submit-complete-page {
    max-width: 700px;
    margin: 40px auto;
  }

  .submit-complete-card {
    border: 0;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
  }

  .submit-complete-card .card-body {
    padding: 60px 40px;
  }

  .success-icon {
    width: 100px;
    height: 100px;
    border-radius: 30px;
    background-color: #eef8f4;
    color: #3f8c75;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    margin-bottom: 28px;
  }

  .success-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--color-dark);
    margin-bottom: 18px;
  }

  .success-desc {
    color: var(--color-muted);
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 30px;
  }

  .info-box {
    background-color: #f8fbfa;
    border: 1px solid var(--color-border);
    border-radius: 18px;
    padding: 18px;
    color: var(--color-dark);
    line-height: 1.7;
    margin-bottom: 35px;
  }

  .result-btn {
    display: flex;
    min-width: 220px;
    height: 50px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
  }

  @media (max-width: 768px) {
    .submit-complete-card .card-body {
      padding: 45px 24px;
    }

    .success-title {
      font-size: 24px;
    }

    .result-btn {
      width: 100%;
    }
  }
</style>

<div class="submit-complete-page">
  <div class="card text-center submit-complete-card">

    <div class="card-body">

      <div class="success-icon">
        ✓
      </div>

      <h3 class="success-title">
        건강검진 정보가 제출되었습니다.
      </h3>

      <p class="success-desc">
        폐활량검사 권고 여부를 분석하였습니다.
      </p>

      <div class="info-box">
        입력하신 문진과 건강검진 정보는 정상적으로 저장되었습니다.<br>
        의사 검토가 필요한 경우 검토 후 결과가 안내됩니다.
      </div>

      <a
        href="{% url 'screening:result_detail' prediction_id %}"
        class="btn btn-primary result-btn"
      >
        결과 확인하기
      </a>

    </div>

  </div>
</div>

{% endblock %}
