{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}미래의료병원 - 폐쇄성폐질환{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  <link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">
  <script src="{% static 'js/regex_patterns.js' %}"></script>
  {% block extra_css %}{% endblock %}
</head>
<body class="auth-body">
<div class="auth-shell">

  <div class="auth-brand-panel">

    <!-- 배경 빛 번짐 (장식, 클릭 영향 없음) -->
    <div class="auth-brand-blob auth-brand-blob-1"></div>
    <div class="auth-brand-blob auth-brand-blob-2"></div>

    <!-- 떠다니는 점들 (장식, 클릭 영향 없음) -->
    <div class="auth-brand-dots">
      <span class="auth-brand-dot" style="left: 18%; top: 22%; animation-delay: 0s;"></span>
      <span class="auth-brand-dot" style="left: 72%; top: 16%; animation-delay: 1.2s;"></span>
      <span class="auth-brand-dot" style="left: 84%; top: 38%; animation-delay: 2.4s;"></span>
      <span class="auth-brand-dot" style="left: 12%; top: 52%; animation-delay: 0.8s;"></span>
      <span class="auth-brand-dot" style="left: 60%; top: 60%; animation-delay: 3s;"></span>
      <span class="auth-brand-dot" style="left: 38%; top: 30%; animation-delay: 1.8s;"></span>
    </div>

    <div class="auth-brand-top">
      <div class="auth-brand-mark"><i class="bi bi-lungs"></i></div>
      <span>미래의료병원 · COPD 선별 시스템</span>
    </div>

    <div class="auth-brand-copy">
      <h2>검진 데이터로 읽는<br>당신의 폐 건강 신호</h2>
      <p>매년 받는 건강검진에 폐 건강을 놓치지 않을 한 단계를 더합니다.</p>
    </div>

    <div class="auth-brand-foot">© 미래의료병원</div>

    <!-- 호흡 곡선 시그니처 (장식 아님: 폐활량-시간 그래프를 추상화한 라인) -->
    <svg class="breath-curve" viewBox="0 0 440 160" xmlns="http://www.w3.org/2000/svg">
      <path fill="none" stroke="#a8cdc3" stroke-width="2" opacity="0.55">
        <animate attributeName="d" dur="6s" repeatCount="indefinite"
          values="
            M -20 110 C 30 110, 50 60, 90 60 C 120 60, 130 130, 165 130 C 195 130, 205 40, 240 40 C 270 40, 280 120, 315 120 C 345 120, 355 75, 390 75 C 410 75, 420 95, 460 95;
            M -20 100 C 30 100, 50 100, 90 90 C 120 80, 130 90, 165 110 C 195 130, 205 70, 240 60 C 270 50, 280 100, 315 105 C 345 110, 355 85, 390 80 C 410 78, 420 90, 460 92;
            M -20 110 C 30 110, 50 60, 90 60 C 120 60, 130 130, 165 130 C 195 130, 205 40, 240 40 C 270 40, 280 120, 315 120 C 345 120, 355 75, 390 75 C 410 75, 420 95, 460 95
          "/>
      </path>
      <path fill="none" stroke="#4a7c72" stroke-width="2" opacity="0.4">
        <animate attributeName="d" dur="6s" repeatCount="indefinite" begin="0.4s"
          values="
            M -20 130 C 30 130, 50 95, 90 95 C 120 95, 130 150, 165 150 C 195 150, 205 80, 240 80 C 270 80, 280 140, 315 140 C 345 140, 355 105, 390 105 C 410 105, 420 120, 460 120;
            M -20 120 C 30 120, 50 130, 90 125 C 120 120, 130 135, 165 130 C 195 125, 205 110, 240 100 C 270 90, 280 125, 315 130 C 345 135, 355 115, 390 112 C 410 110, 420 118, 460 116;
            M -20 130 C 30 130, 50 95, 90 95 C 120 95, 130 150, 165 150 C 195 150, 205 80, 240 80 C 270 80, 280 140, 315 140 C 345 140, 355 105, 390 105 C 410 105, 420 120, 460 120
          "/>
      </path>
    </svg>
  </div>

  <div class="auth-form-panel">
    <div class="auth-shape auth-shape-corner-tr"></div>
    <div class="auth-shape auth-shape-corner-bl"></div>
    <span class="auth-shape-dot auth-shape-dot-1"></span>
    <span class="auth-shape-dot auth-shape-dot-2"></span>
    <span class="auth-shape-ring"></span>
    <div class="auth-form-card">
      {% block auth_content %}{% endblock %}
    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/parsleyjs@2.9.2/dist/parsley.min.js"></script>
<script src="{% static 'js/parsley_config.js' %}"></script>
<script src="{% static 'accounts/js/auth.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
