{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}미래의료병원 - 폐쇄성폐질환{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  <link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">

  {% block extra_css %}{% endblock %}
</head>
<body class="auth-body">
<div class="auth-shell">

  <div class="auth-brand-panel">
    <div class="auth-brand-top">
      <div class="auth-brand-mark"><i class="bi bi-lungs"></i></div>
      <span>미래의료병원 · 폐쇄성폐질환</span>
    </div>

    <div class="auth-brand-copy">
      <h2>검진 데이터로 읽는<br>당신의 폐 건강 신호</h2>
      <p>매년 받는 건강검진에 폐 건강을 놓치지 않을 한 단계를 더합니다.</p>
    </div>

    <div class="auth-brand-foot">© 미래의료병원</div>

    <!-- 호흡 곡선 시그니처 (장식 아님: 폐활량-시간 그래프를 추상화한 라인) -->
    <svg class="breath-curve" viewBox="0 0 440 160" xmlns="http://www.w3.org/2000/svg">
      <path d="M -20 110
               C 30 110, 50 60, 90 60
               C 120 60, 130 130, 165 130
               C 195 130, 205 40, 240 40
               C 270 40, 280 120, 315 120
               C 345 120, 355 75, 390 75
               C 410 75, 420 95, 460 95"
            fill="none" stroke="#a8cdc3" stroke-width="2" opacity="0.55"/>
      <path d="M -20 130
               C 30 130, 50 95, 90 95
               C 120 95, 130 150, 165 150
               C 195 150, 205 80, 240 80
               C 270 80, 280 140, 315 140
               C 345 140, 355 105, 390 105
               C 410 105, 420 120, 460 120"
            fill="none" stroke="#4a7c72" stroke-width="2" opacity="0.4"/>
    </svg>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-card">
      {% block auth_content %}{% endblock %}
    </div>
  </div>

</div>
{% block extra_js %}{% endblock %}
</body>
</html>
