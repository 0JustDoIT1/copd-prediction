{% extends "accounts/auth_base.html" %}
{% block title %}회원가입 - 미래의료병원{% endblock %}

{% block auth_content %}
<div class="auth-form-title">회원가입</div>
<div class="auth-form-subtitle">가입 유형을 선택해주세요</div>

<a href="{% url 'accounts:signup_patient' %}" class="role-select-card-link">
  <div class="role-select-card">
    <div class="role-select-icon role-select-icon-patient">
      <i class="bi bi-person"></i>
    </div>
    <div class="role-select-text">
      <div class="role-select-title">환자로 가입</div>
      <div class="role-select-desc">검진 데이터를 입력하고 결과를 받아보세요</div>
    </div>
    <i class="bi bi-chevron-right role-select-arrow"></i>
  </div>
</a>

<a href="{% url 'accounts:signup_doctor' %}" class="role-select-card-link">
  <div class="role-select-card">
    <div class="role-select-icon role-select-icon-doctor">
      <i class="bi bi-clipboard2-pulse"></i>
    </div>
    <div class="role-select-text">
      <div class="role-select-title">의사로 가입</div>
      <div class="role-select-desc">권고 점수를 확인하고 환자를 진료하세요</div>
    </div>
    <i class="bi bi-chevron-right role-select-arrow"></i>
  </div>
</a>

<p class="text-center mt-4 mb-0" style="font-size: 13.5px;">
  이미 계정이 있으신가요? <a href="{% url 'accounts:login' %}">로그인</a>
</p>
{% endblock %}

{% block extra_css %}
<style>
  .role-select-card-link {
    text-decoration: none;
    display: block;
    margin-bottom: 14px;
  }

  .role-select-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background-color: #ffffff;
    border: 1.5px solid var(--color-border);
    border-radius: 16px;
    padding: 18px 20px;
    cursor: pointer;
    transition:
      border-color 0.18s ease,
      box-shadow 0.18s ease,
      transform 0.18s ease;
  }

  .role-select-card:hover {
    border-color: var(--color-main);
    box-shadow: 0 10px 24px rgba(74, 124, 114, 0.14);
    transform: translateY(-2px);
  }

  .role-select-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .role-select-icon-patient {
    background-color: var(--color-bg);
    color: var(--color-main);
  }

  .role-select-icon-doctor {
    background-color: rgba(168, 205, 195, 0.35);
    color: var(--color-dark);
  }

  .role-select-text {
    flex: 1;
    min-width: 0;
  }

  .role-select-title {
    font-weight: 600;
    color: var(--color-dark);
    font-size: 14.5px;
    margin-bottom: 2px;
  }

  .role-select-desc {
    font-size: 12.5px;
    color: var(--color-muted);
  }

  .role-select-arrow {
    color: var(--color-muted);
    font-size: 16px;
    flex-shrink: 0;
    transition: transform 0.18s ease, color 0.18s ease;
  }

  .role-select-card:hover .role-select-arrow {
    color: var(--color-main);
    transform: translateX(3px);
  }
</style>
{% endblock %}
